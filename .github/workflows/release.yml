name: Update appcast on release

# Fires when you publish a GitHub Release that has the signed/notarized DMG
# attached. The workflow downloads that DMG, signs it with Sparkle's EdDSA
# private key, and prepends a new <item> to docs/appcast.xml so every Clippy
# user sees the update on their next check.
#
# You handle all Apple signing + notarization locally. The only secret this
# workflow needs is SPARKLE_PRIVATE_KEY.

on:
  release:
    types: [published]

jobs:
  appcast:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      # Check out main (not the tag) so pushing the appcast commit is a
      # fast-forward. We still reference the tag via github.event.release.tag_name
      # for the version metadata.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version from release tag
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading v/V so "v1.0.5" and "V1.0.5" both yield "1.0.5".
          VERSION="${TAG#v}"
          VERSION="${VERSION#V}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download update asset from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Sparkle supports both .dmg and .zip. Grab whichever is attached;
          # prefer .dmg if both exist (better UX on install). Fails clearly
          # if neither is present.
          ASSET_NAME=$(gh release view "${{ steps.meta.outputs.tag }}" \
            --json assets \
            --jq '[.assets[] | select(.name | test("\\.dmg$|\\.zip$"))]
                  | sort_by(if (.name | endswith(".dmg")) then 0 else 1 end)
                  | .[0].name')
          if [ -z "$ASSET_NAME" ] || [ "$ASSET_NAME" = "null" ]; then
            echo "::error::No .dmg or .zip asset found on release ${{ steps.meta.outputs.tag }}"
            exit 1
          fi
          echo "Found asset: $ASSET_NAME"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
          gh release download "${{ steps.meta.outputs.tag }}" --pattern "$ASSET_NAME" --clobber

      - name: Install Sparkle CLI (for sign_update)
        run: brew install --cask sparkle

      - name: Sign the asset with EdDSA
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" | base64 --decode > sparkle_private
          SPARKLE_BIN=$(find /opt/homebrew/Caskroom/sparkle -type f -name sign_update -perm +111 | head -n 1)
          SIGNED=$("$SPARKLE_BIN" "$ASSET_NAME" -f sparkle_private)
          rm sparkle_private

          echo "Sparkle output: $SIGNED"
          SIGNATURE=$(echo "$SIGNED" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(echo "$SIGNED" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

          if [ -z "$SIGNATURE" ] || [ -z "$LENGTH" ]; then
            echo "::error::Failed to parse Sparkle signature/length"
            exit 1
          fi

          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> "$GITHUB_ENV"
          echo "SPARKLE_LENGTH=$LENGTH" >> "$GITHUB_ENV"

      - name: Update appcast.xml
        run: ./scripts/update-appcast.sh "${{ steps.meta.outputs.version }}" "$SPARKLE_SIGNATURE" "$SPARKLE_LENGTH" "$ASSET_NAME"

      - name: Commit appcast changes to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Save our updated appcast somewhere safe BEFORE switching branches,
          # otherwise the checkout would overwrite it with main's version.
          cp docs/appcast.xml /tmp/appcast.xml.new

          # Move to main regardless of whatever ref was initially checked out
          # (tag, detached HEAD, something else). This is the core fix: we
          # build the commit on top of the real main branch so the push is
          # always a fast-forward.
          git fetch origin main
          git checkout -B main origin/main

          # Restore our updated appcast and commit it.
          cp /tmp/appcast.xml.new docs/appcast.xml
          git add docs/appcast.xml
          if git diff --cached --quiet; then
            echo "No appcast changes to commit."
            exit 0
          fi
          git commit -m "chore: update appcast for ${{ steps.meta.outputs.tag }}"

          # Retry in case someone pushed to main between fetch and push.
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "✓ appcast pushed"
              exit 0
            fi
            echo "Push rejected (attempt $attempt). Rebasing on latest main..."
            git pull --rebase origin main
          done

          echo "::error::Could not push appcast update after 3 attempts"
          exit 1
